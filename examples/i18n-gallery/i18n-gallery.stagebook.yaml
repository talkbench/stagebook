# i18n gallery — the localization authoring pattern, dogfooded.
#
# TWO templates (one `contentType: introSequence`, one
# `contentType: treatment`) define the structure once; `${locale}`
# threads into BOTH the top-level `locale:` (driving stagebook's chrome
# catalog + RTL) and the prompt `file:` paths (selecting per-language
# content). Each arm supplies the value once, so the declaration and the
# content can never disagree.
#
# Intro sequences run BEFORE treatment assignment, so they carry their
# OWN locale (they can't inherit a treatment's) — this file shows a
# localized intro sequence alongside the localized treatment, the exact
# pattern a real multilingual study uses.
#
# Use the viewer's treatment picker to flip between the English and
# Hebrew arms. The Hebrew arm renders right-to-left: the slider mirrors
# (min on the right), the timer label and char counter swap sides, the
# dropdown/list-sorter/chrome all read RTL — while every recorded value
# stays identical to the English arm.
#
# The locale-consistency rule enforces the pairing: a prompt under
# prompts/he/ must declare `locale: he` in its frontmatter, and it's
# checked against its CONTAINER's locale (the intro sequence for the
# welcome step, the consent ARM for consent steps, the treatment for
# the game stages AND exit steps).
#
# Consent (#481) is a top-level collection of arms; the host selects
# one arm by name, before anything else runs. Like intro sequences,
# arms declare their own locale, so the same `${locale}` single-source
# pattern applies — one `contentType: consentArm` template, one arm per
# language. Consent responses are audit-only: nothing outside consent
# may reference them, but a SAME-STEP reference is legal and
# live-reactive, which is what gates the "I consent" button on the
# acknowledgement checkbox below.

templates:
  # --- Intro sequence (pre-assignment; declares its own locale) ---
  - name: gallery-intro
    contentType: introSequence
    notes: |
      Welcome/consent-style intro. Localized independently of the
      treatment because intro runs before a participant is assigned.
    content:
      name: gallery intro ${locale}
      locale: ${locale}
      introSteps:
        - name: welcome
          elements:
            - type: prompt
              file: prompts/${locale}/intro.prompt.md
            - type: submitButton

  # --- Consent arm (runs first; host selects the arm by name) ---
  - name: gallery-consent
    contentType: consentArm
    notes: |
      The GATED consent pattern, localized. The acknowledgement
      checkbox and the "I consent" button share one step, and the
      button's `conditions:` pass only once the checkbox includes the
      localized option text (same-step consent references are
      live-reactive). The button label and the gate value are
      participant-facing STRINGS, not files, so each arm threads them
      through template fields alongside its locale.
    content:
      name: gallery consent ${locale}
      locale: ${locale}
      steps:
        - name: consent
          elements:
            - type: prompt
              file: prompts/${locale}/consent.prompt.md
            - type: prompt
              name: consent_ack
              file: prompts/${locale}/acknowledge.prompt.md
            - type: submitButton
              buttonText: ${consent_label}
              conditions:
                - reference: self.prompt.consent_ack
                  comparator: includes
                  value: ${ack_text}

  # --- Treatment body (game stages) ---
  - name: gallery-body
    contentType: treatment
    notes: |
      One structure; ${locale} selects the per-language prompt files
      and sets the treatment's declared locale.
    content:
      name: i18n gallery ${locale}
      locale: ${locale}
      playerCount: 1
      # ${locale} threads here too, so each arm pairs with its
      # same-locale intro sequence.
      compatibleIntroSequences: ["gallery intro ${locale}"]
      gameStages:
        - name: choices
          duration: 600
          notes: |
            RadioGroup + CheckboxGroup. Option rows mirror under RTL;
            the recorded value is the chosen option, identical to en.
          elements:
            - type: prompt
              file: prompts/${locale}/radio.prompt.md
            - type: separator
            - type: prompt
              file: prompts/${locale}/checkbox.prompt.md
            - type: submitButton

        - name: dropdown
          duration: 600
          notes: |
            Select (dropdown) — the chrome placeholder + options read
            in the active locale/direction.
          elements:
            - type: prompt
              file: prompts/${locale}/dropdown.prompt.md
            - type: submitButton

        - name: slider
          duration: 600
          notes: |
            The RTL showcase: under the Hebrew arm the slider mirrors
            (min paints on the right), matching reading direction,
            while min still records as min.
          elements:
            - type: prompt
              file: prompts/${locale}/slider.prompt.md
            - type: submitButton

        - name: ordering
          duration: 600
          notes: |
            ListSorter — drag-to-rank. Items + layout follow the
            locale direction.
          elements:
            - type: prompt
              file: prompts/${locale}/listsorter.prompt.md
            - type: submitButton

        - name: writing
          duration: 90
          notes: |
            Open response with a character counter (count-neutral
            catalog string) plus the stage timer — both localize, and
            the textarea follows RTL for Hebrew typing.
          elements:
            - type: timer
            - type: prompt
              file: prompts/${locale}/open.prompt.md
            - type: submitButton

      # The debrief is authored as the trailing step(s) of the exit
      # sequence — there is no separate `debrief:` field. Exit steps run
      # after the game stages and inherit the treatment's locale, so this
      # prompt file is checked against the same locale the arm declared up
      # top, no extra plumbing. In a real study the platform runs its
      # quality-control survey and issues the completion code after the
      # exit sequence, so the completion code stays gated behind these steps.
      exitSequence:
        - name: debrief
          elements:
            - type: prompt
              file: prompts/${locale}/debrief.prompt.md
            - type: submitButton

consent:
  - template: gallery-consent
    fields:
      locale: en
      consent_label: I consent
      ack_text: I have read and understood the information above
  - template: gallery-consent
    fields:
      locale: he
      consent_label: אני מסכים/ה
      ack_text: קראתי והבנתי את המידע שלמעלה

introSequences:
  - template: gallery-intro
    fields:
      locale: en
  - template: gallery-intro
    fields:
      locale: he

treatments:
  - template: gallery-body
    fields:
      locale: en
  - template: gallery-body
    fields:
      locale: he
