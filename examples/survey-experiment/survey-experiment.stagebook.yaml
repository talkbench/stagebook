# Survey experiment — single-player pre/post design.
# A single template generates both the control and treatment arms by
# broadcasting over `${condition}`. The reading stage uses
# `displayTime` / `hideTime` on its elements to walk the participant
# through instructions → passage → submit, demonstrating timed reveals
# (and giving the viewer's time-scrubber breakpoints to land on).

templates:
  - name: studyTreatment
    contentType: treatment
    notes: |
      One arm of the experiment, parameterised by `${condition}`. The
      attitude prompts are identical across arms; only the article
      file changes — `prompts/article_${condition}.prompt.md`. This
      lets the same template generate both treatments via broadcast
      below.
    content:
      name: Survey experiment - ${condition}
      notes: A single-player pre/post attitude study with a ${condition} reading manipulation.
      playerCount: 1

      gameStages:
        - name: pre_attitude
          duration: 60
          notes: |
            Pre-treatment attitude reading. The same prompt file appears
            again on `post_attitude` after the manipulation; both share
            distinct `name:` values (`pre_attitude` vs `post_attitude`)
            so the analyst can subtract one from the other when
            evaluating the experiment.
          elements:
            - type: prompt
              name: pre_attitude
              file: prompts/attitude_pre.prompt.md
            - type: timer
            - type: submitButton

        - name: ${condition}_reading
          duration: 120
          notes: |
            Timed reading stage — demonstrates `displayTime` and
            `hideTime` working together to sequence elements within a
            single stage. The viewer's time scrubber lands on each
            of these breakpoints (5s, 30s) so you can preview the
            participant's view at each phase.
          elements:
            - type: prompt
              file: prompts/reading_instructions.prompt.md
              hideTime: 5
              notes: "Visible 0–5s via `hideTime: 5` — short orientation before the passage."

            - type: prompt
              name: ${condition}_article
              file: prompts/article_${condition}.prompt.md
              displayTime: 5
              notes: |
                Visible from 5s onward. The `${condition}` placeholder
                resolves at template expansion to either `control` or
                `treatment`, picking the matching article file. Naming
                it `${condition}_article` keeps the saved-event log
                informative even though the prompt collects no input.

            - type: timer

            - type: submitButton
              displayTime: 30
              notes: Hidden for the first 30s so the participant doesn't skim and skip — they're forced to dwell on the passage.

        - name: comprehension
          duration: 60
          notes: |
            Comprehension check before the post-attitude question. If a
            participant fails the check (open-response is required),
            the analyst can drop them in post-processing.
          elements:
            - type: prompt
              name: ${condition}_comprehension
              file: prompts/comprehension.prompt.md
            - type: submitButton

        - name: post_attitude
          duration: 60
          notes: |
            Post-treatment attitude reading. Same slider prompt as
            `pre_attitude`, captured under a distinct response name so
            pre/post differencing is straightforward.
          elements:
            - type: prompt
              name: post_attitude
              file: prompts/attitude_post.prompt.md
            - type: submitButton

      exitSequence:
        - name: Reflection
          notes: Per-arm exit step — collects free-form reflection on the manipulation.
          elements:
            - type: prompt
              name: ${condition}_reflection
              file: prompts/feedback.prompt.md
            - type: submitButton

introSequences:
  - name: orientation
    notes: Solo intro shared across both arms.
    introSteps:
      - name: Instructions
        elements:
          - type: prompt
            file: prompts/instructions.prompt.md
          - type: submitButton
            buttonText: Continue

# Two treatments — control and treatment — generated by broadcasting
# over the `condition` field. The viewer's treatment picker shows them
# side-by-side; in a real deployment, the host platform would randomise
# participants between them.
treatments:
  - template: studyTreatment
    broadcast:
      d0:
        - condition: control
        - condition: treatment
