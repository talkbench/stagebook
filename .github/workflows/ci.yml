name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      stagebook: ${{ steps.filter.outputs.stagebook }}
      viewer: ${{ steps.filter.outputs.viewer }}
      vscode: ${{ steps.filter.outputs.vscode }}
      ct: ${{ steps.filter.outputs.ct }}
      lint: ${{ steps.filter.outputs.lint }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Needed so dorny/paths-filter can diff base vs HEAD reliably on push events.
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            stagebook:
              - 'packages/stagebook/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            viewer:
              - 'apps/viewer/**'
              - 'packages/stagebook/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            vscode:
              - 'apps/vscode/**'
              - 'packages/stagebook/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            ct:
              - 'packages/stagebook/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            lint:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.json'
              - '.prettierrc'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint & Format
    needs: changes
    if: needs.changes.outputs.lint == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  test-stagebook:
    name: Unit Tests (stagebook)
    needs: changes
    if: needs.changes.outputs.stagebook == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test -w stagebook

  test-viewer:
    name: Unit Tests (viewer)
    needs: changes
    if: needs.changes.outputs.viewer == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w stagebook
      - run: npm test -w stagebook-viewer

  test-vscode:
    name: Unit Tests (vscode)
    needs: changes
    if: needs.changes.outputs.vscode == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w stagebook
      - run: npm test -w stagebook-vscode

  test-ct:
    name: Component Tests (Playwright)
    needs: changes
    if: needs.changes.outputs.ct == 'true'
    runs-on: ubuntu-latest
    # Playwright runs are noisy — p50 ~2min but cold-cache runs have
    # been observed up to ~7.5min. 10 leaves ~30% headroom over the
    # worst observed; tighter trips false alarms on cold runners.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:ct -w stagebook

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

  ci-gate:
    name: CI Gate
    if: always()
    needs: [changes, lint, test-stagebook, test-viewer, test-vscode, test-ct, build]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled"
            echo "Upstream job results:"
            echo '${{ toJson(needs) }}'
            exit 1
          fi
