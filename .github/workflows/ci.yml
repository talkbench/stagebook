name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Merge queue: GitHub tests each queued PR on a temporary `merge_group` ref
  # (main + the PRs ahead of it). Without this trigger the required `CI Gate`
  # check never runs in the queue and PRs hang. On this event every test job
  # runs unconditionally (see the `|| github.event_name == 'merge_group'`
  # guards below) — skipping via the paths-filter here would let `CI Gate` go
  # green WITHOUT running the suite, merging the combined state untested.
  merge_group:

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      stagebook: ${{ steps.filter.outputs.stagebook }}
      viewer: ${{ steps.filter.outputs.viewer }}
      vscode: ${{ steps.filter.outputs.vscode }}
      ct: ${{ steps.filter.outputs.ct }}
      lint: ${{ steps.filter.outputs.lint }}
      action: ${{ steps.filter.outputs.action }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Needed so dorny/paths-filter can diff base vs HEAD reliably on push events.
          fetch-depth: 0
      # Skipped in the merge queue: there's no base/HEAD diff to compute, and
      # every job runs unconditionally there anyway. Its outputs are then empty
      # ('' != 'true'), so jobs run only via their `merge_group` guard.
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'merge_group'
        with:
          filters: |
            stagebook:
              - 'packages/stagebook/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            viewer:
              - 'apps/viewer/**'
              - 'packages/stagebook/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            vscode:
              - 'apps/vscode/**'
              - 'packages/stagebook/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            ct:
              - 'packages/stagebook/**'
              - 'package.json'
              - 'package-lock.json'
              - '.github/workflows/ci.yml'
            lint:
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.json'
              - '.prettierrc'
              # All workflow files, so `format:check` guards them — a PR that
              # edits only a workflow (e.g. release-vscode.yml) still runs lint.
              - '.github/workflows/*.yml'
            action:
              - 'validate-action/**'
              - '.github/workflows/ci.yml'

  lint:
    name: Lint & Format
    needs: changes
    if: needs.changes.outputs.lint == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  test-stagebook:
    name: Unit Tests (stagebook)
    needs: changes
    if: needs.changes.outputs.stagebook == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test -w stagebook

  test-viewer:
    name: Unit Tests (viewer)
    needs: changes
    if: needs.changes.outputs.viewer == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w stagebook
      - run: npm test -w stagebook-viewer

  test-vscode:
    name: Unit Tests (vscode)
    needs: changes
    if: needs.changes.outputs.vscode == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build -w stagebook
      - run: npm test -w stagebook-vscode

  package-vscode:
    name: Package (vscode)
    needs: changes
    if: needs.changes.outputs.vscode == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v5
        with:
          # This job never needs the token after checkout (it only builds and
          # uploads an artifact), so don't leave it in .git/config while
          # `npm ci`/`vsce` run arbitrary dependency scripts.
          persist-credentials: false
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # `vsce package` runs the `vscode:prepublish` script (library build +
      # production bundle) before packaging, so this surfaces any packaging
      # regression on every PR that touches the extension — the drift that
      # used to be caught only by a human remembering to rebuild (#494).
      - run: npm run package -w stagebook-vscode
      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: stagebook-vscode-vsix
          path: apps/vscode/*.vsix
          if-no-files-found: error

  test-ct:
    name: Component Tests (${{ matrix.browser }} ${{ matrix.shard }}/4)
    needs: changes
    if: needs.changes.outputs.ct == 'true' || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    # Each shard runs ~1/4 of the suite at `--workers=1`, so per-shard
    # wall clock should be ~1-2 min over the ~30s setup baseline. 10
    # leaves comfortable headroom over the worst observed.
    timeout-minutes: 10
    strategy:
      # Run every (browser, shard) combination even when one fails so
      # the PR shows which engine(s) and which shard(s) broke at a
      # glance instead of failing fast on the first one.
      fail-fast: false
      matrix:
        browser: [chromium, webkit, firefox]
        # Sharding strategy (#457): the webkit-on-Linux failures look
        # like a pointer-event scheduling race that surfaces when
        # Playwright's microtasks compete with parallel-worker CPU
        # contention on the 2-core GitHub runner. Locally on Mac the
        # same tests pass 448/448. The fix is twofold:
        #   1. `--workers=1` per job removes intra-job contention
        #      (the actual flake mitigation)
        #   2. `--shard=K/N` recovers parallelism across jobs (each
        #      shard gets its own runner, so total wall clock stays
        #      around max(shard time) rather than sum)
        # 4 shards per browser × 3 browsers = 12 jobs. Public repos on
        # standard ubuntu runners have no minute cap, so the extra
        # billable minutes are free.
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      # Cache the Playwright browser binaries (~150MB per engine)
      # keyed on the `@playwright/experimental-ct-react` version
      # pinned in package-lock.json AND the browser project name —
      # different browsers expand to different cache keys so we don't
      # over-fetch unrelated engines on hit. On a hit, only the small
      # `install-deps` step runs (apt-get for system libs — libnss3,
      # libatk, …). Saves ~25s on cached runs.
      #
      # Alternative if this stops paying off: run inside the
      # `mcr.microsoft.com/playwright:vX.Y.Z-noble` image (matching
      # the Playwright version in package-lock.json). The image
      # ships browsers + system deps pre-installed, so the entire
      # 33s install step disappears — but two gotchas:
      #   1. GitHub Actions runs container jobs as root by default.
      #      Chromium refuses to launch as root without
      #      `--no-sandbox`. Fix: set `container.options: --user 1001`
      #      (matches the runner's UID) OR add `args: ["--no-sandbox"]`
      #      to the chromium launch options in playwright-ct.config.ts.
      #      runner's playwright_component.yml uses the
      #      `--user 1001` form.
      #   2. The image tag MUST track the `@playwright/experimental-
      #      ct-react` version in package-lock.json (two places to
      #      bump on a Playwright upgrade — drift breaks the browser
      #      protocol).
      # See PR #366 for the full cache-vs-image trade-off discussion.
      - name: Get Playwright version
        id: pw-version
        run: |
          ver=$(node -p "require('@playwright/experimental-ct-react/package.json').version")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}-${{ matrix.browser }}
      - name: Install Playwright browser (cache miss)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Install Playwright system deps (cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps ${{ matrix.browser }}
      - run: npx playwright test --config playwright-ct.config.ts --project=${{ matrix.browser }} --workers=1 --shard=${{ matrix.shard }}/4
        working-directory: packages/stagebook

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build

  validate-action:
    name: Dogfood validate-action
    needs: changes
    if: needs.changes.outputs.action == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # The action fetches + runs a network-downloaded package (npx), so scope
    # this job to read-only — it never needs to write anything.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      # Stage the fixtures as standalone study repos OUTSIDE this monorepo.
      # `npx`/`npm exec` resolve `stagebook` against the nearest project;
      # run from the repo root, npm matches the requested version to this
      # repo's own `packages/stagebook` workspace (same version) and tries to
      # run it locally — uninstalled → "not found" — instead of fetching from
      # npm. A real no-JS study repo has no such workspace, so validate from a
      # plain directory the same way a study repo's CI would.
      - name: Stage fixtures as standalone study repos
        run: |
          mkdir -p "$RUNNER_TEMP/study" "$RUNNER_TEMP/study-invalid"
          cp -R validate-action/fixtures/. "$RUNNER_TEMP/study/"
          cp -R validate-action/fixtures-invalid/. "$RUNNER_TEMP/study-invalid/"
      # Happy path: run the composite action end-to-end (setup-node + npx +
      # glob quoting + import resolution). Pins the validator to the current
      # release so the dogfood isn't coupled to unreleased schema changes.
      - name: Valid fixtures (text) → exit 0
        uses: ./validate-action
        with:
          version: "0.21.0"
          working-directory: ${{ runner.temp }}/study
          files: |
            **/*.stagebook.yaml
            **/*.prompt.md
      # JSON output branch (also skips the problem matcher).
      - name: Valid fixtures (json)
        uses: ./validate-action
        with:
          version: "0.21.0"
          format: json
          working-directory: ${{ runner.temp }}/study
          files: |
            **/*.stagebook.yaml
            **/*.prompt.md
      # --no-expand branch (raw syntax only).
      - name: Valid treatment (no-expand)
        uses: ./validate-action
        with:
          version: "0.21.0"
          no-expand: "true"
          working-directory: ${{ runner.temp }}/study
          files: "**/*.stagebook.yaml"
      # Negative case: the action must fail the job on a validation error.
      # `continue-on-error` lets the job survive so the next step can assert
      # the failure — this guards the exit-code propagation that is the whole
      # point of the action.
      - name: Invalid fixture → non-zero
        id: expect_fail
        continue-on-error: true
        uses: ./validate-action
        with:
          version: "0.21.0"
          working-directory: ${{ runner.temp }}/study-invalid
          files: "**/*.prompt.md"
      - name: Assert the invalid fixture failed validation
        if: steps.expect_fail.outcome != 'failure'
        run: |
          echo "Expected validate-action to fail on the invalid fixture, got '${{ steps.expect_fail.outcome }}'" >&2
          exit 1

  ci-gate:
    name: CI Gate
    if: always()
    needs:
      [
        changes,
        lint,
        test-stagebook,
        test-viewer,
        test-vscode,
        package-vscode,
        test-ct,
        build,
        validate-action,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Check for failures
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more CI jobs failed or were cancelled"
            echo "Upstream job results:"
            echo '${{ toJson(needs) }}'
            exit 1
          fi
